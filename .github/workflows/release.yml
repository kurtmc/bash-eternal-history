name: goreleaser

on:
  push:
    tags:
      - '*'

# goreleaser needs to create the GitHub release and upload assets; nothing else.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match the module's declared Go version rather than floating
          # "stable", so each release is built with the version under test.
          go-version-file: go.mod
      - name: Test
        run: go test -race ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
